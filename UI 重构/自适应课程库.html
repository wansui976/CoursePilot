<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>course-ai · 自适应课程库</title>
<link rel="stylesheet" href="lib-styles.css" />
<link rel="stylesheet" href="lib-dirs.css" />
<style>
  /* ===================== PREVIEW SHELL (演示外壳，非应用本体) ===================== */
  html, body { height: 100%; }
  body {
    margin: 0; background: #0c0d10; color: #e9eaee; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .preview { height: 100vh; display: flex; flex-direction: column; }

  .pv-bar {
    flex: 0 0 auto; height: 54px; display: flex; align-items: center; gap: 18px;
    padding: 0 18px; background: #15171c; border-bottom: 1px solid #23262d;
  }
  .pv-brand { display: flex; align-items: center; gap: 9px; font-size: 13px; font-weight: 600; letter-spacing: .02em; color: #c7cad2; }
  .pv-brand .dot { width: 9px; height: 9px; border-radius: 50%; background: #2f6cea; box-shadow: 0 0 8px rgba(47,108,234,.7); }
  .pv-brand .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; color: #7c828d; font-weight: 500; }

  .pv-seg { display: inline-flex; background: #1d2027; border: 1px solid #2a2e36; border-radius: 9px; padding: 3px; gap: 2px; }
  .pv-seg button {
    border: none; background: transparent; color: #9aa0ab; cursor: pointer;
    font-family: inherit; font-size: 12.5px; font-weight: 600; padding: 6px 13px; border-radius: 6px;
    display: inline-flex; align-items: center; gap: 7px; transition: background .14s, color .14s; white-space: nowrap;
  }
  .pv-seg button:hover { color: #e9eaee; }
  .pv-seg button.on { background: #2f6cea; color: #fff; }
  .pv-seg .tag { font-size: 10.5px; font-weight: 500; opacity: .8; }

  .pv-label { font-size: 11px; font-weight: 600; letter-spacing: .06em; color: #5b616c; margin-right: -8px; }

  #deviceBar { display: inline-flex; gap: 4px; }
  #deviceBar button {
    border: 1px solid #2a2e36; background: #1a1d23; color: #9aa0ab; cursor: pointer;
    font-family: inherit; font-size: 12px; font-weight: 550; height: 32px; padding: 0 11px; border-radius: 7px;
    transition: background .14s, color .14s, border-color .14s; white-space: nowrap;
  }
  #deviceBar button:hover { color: #e9eaee; border-color: #3a3f49; }
  #deviceBar button.on { background: #23262d; color: #fff; border-color: #444b57; }

  .pv-readout {
    margin-left: auto; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; color: #7c828d;
    background: #1a1d23; border: 1px solid #23262d; padding: 6px 12px; border-radius: 7px; white-space: nowrap;
  }

  /* stage that holds the device frame */
  .pv-stage {
    flex: 1; min-height: 0; padding: 0; display: flex; align-items: stretch; justify-content: center;
    background:
      radial-gradient(120% 80% at 50% 0%, #14161b 0%, #0c0d10 70%);
    overflow: hidden;
  }
  .pv-stage.padded { padding: 26px; }

  /* the responsive container — its width is driven by the device preset */
  #frame {
    height: 100%; width: 100%; min-width: 0;
    flex: 1 1 auto;
    display: flex; overflow: hidden;
    /* >>> container queries inside .app read THIS element's width <<< */
    container: app / inline-size;
    transition: width .3s cubic-bezier(.22,.61,.36,1);
  }
  #frame.boxed {
    flex: 0 0 auto;
    height: calc(100% - 52px); margin: auto; border-radius: 16px;
    box-shadow: 0 30px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04);
    outline: 6px solid #1a1d23; outline-offset: 0;
  }
  /* give boxed stage breathing room (class toggled from JS) */
  .pv-stage.padded { padding: 26px; }
  .pv-stage.padded #app { border-radius: 11px; }
</style>
</head>
<body>
  <div class="preview">
    <!-- ===================== preview controls ===================== -->
    <div class="pv-bar">
      <div class="pv-brand"><span class="dot"></span>course-ai <span class="mono">/ 自适应预览</span></div>

      <div class="pv-seg" id="dirBar">
        <button data-dir="a">方向 A<span class="tag">媒体库</span></button>
        <button data-dir="b">方向 B<span class="tag">工作台</span></button>
      </div>

      <span class="pv-label">设备</span>
      <div id="deviceBar">
        <button data-device="fit">自适应</button>
        <button data-device="desktop">桌面</button>
        <button data-device="laptop">笔记本</button>
        <button data-device="ipadL">iPad 横</button>
        <button data-device="ipadP">iPad 竖</button>
        <button data-device="phone">手机</button>
      </div>

      <div class="pv-readout" id="readout">自适应</div>
    </div>

    <!-- ===================== stage + responsive app ===================== -->
    <div class="pv-stage" id="stage">
      <div id="frame">

        <!-- ░░░░░░░░░░░░░░░░░░░░  APP  ░░░░░░░░░░░░░░░░░░░░ -->
        <div class="app" id="app" data-dir="a" data-theme="light">

          <div class="scrim" id="scrim"></div>

          <!-- ===== sidebar ===== -->
          <aside class="side" id="side">
            <div class="brand">
              <span class="logo">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
              </span>
              <span class="label">
                <h1>课程库</h1>
              </span>
            </div>

            <button class="new-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span class="txt">新建课程</span></button>

            <nav class="nav" id="nav" style="margin-bottom:14px">
              <div class="nav-item" data-folder="">
                <span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="9" y1="9" x2="15" y2="9"/></svg></span>
                <span class="nm">处理队列</span>
                <span class="count">2</span>
              </div>
            </nav>

            <div class="nav-label">我的课程</div>
            <nav class="nav" id="navFolders">
              <div class="nav-item active" data-folder="shenlun">
                <span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg></span>
                <span class="nm">申论</span>
                <span class="count">8</span>
              </div>
              <div class="nav-item" data-folder="record">
                <span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg></span>
                <span class="nm">录制视频</span>
                <span class="count">3</span>
              </div>
            </nav>

            <div class="side-sp"></div>

            <div class="side-foot">
              <div class="foot-item" id="darkToggle">
                <span class="ic"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></span>
                <span class="ft-tx">深色模式</span>
                <span class="switch" id="darkSwitch"></span>
              </div>
              <div class="foot-item">
                <span class="ic"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg></span>
                <span class="ft-tx">设置</span>
              </div>
            </div>
          </aside>

          <!-- ===== main ===== -->
          <main class="main">
            <div class="topbar">
              <div class="tb-lead">
                <button class="hamb" id="hamb" title="菜单"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
                <div class="tb-titles">
                  <h2>课程视频</h2>
                  <div class="sub" id="folderSub">申论 · 8 个视频</div>
                </div>
              </div>
              <div class="tb-actions">
                <div class="search">
                  <span class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
                  <input placeholder="搜索视频…" />
                </div>
                <div class="seg" id="viewSeg">
                  <button data-view="grid" title="网格"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></button>
                  <button data-view="list" title="列表"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
                </div>
                <div class="import-split">
                  <button class="btn btn-primary"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><span class="imp-tx">导入</span></button>
                  <button class="caret" title="更多导入方式"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
                </div>
              </div>
            </div>

            <div class="filters" id="filters"></div>

            <div class="scroll">
              <div id="heroArea"></div>
              <div id="contentArea"></div>
            </div>
          </main>

        </div>
        <!-- ░░░░░░░░░░░░░░░░░░░░  /APP  ░░░░░░░░░░░░░░░░░░░░ -->

      </div>
    </div>
  </div>

  <script src="lib-app.js"></script>
</body>
</html>
