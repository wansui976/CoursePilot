name: macOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to upload macOS assets to
        required: true
        default: v0.1.1

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-15
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: course-ai/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: course-ai
        run: pnpm install --frozen-lockfile

      - name: Build macOS bundles
        working-directory: course-ai
        run: pnpm tauri build --bundles app,dmg

      - name: Upload macOS DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" \
            course-ai/src-tauri/target/release/bundle/dmg/course-ai_*.dmg \
            --clobber \
            --repo "$GITHUB_REPOSITORY"
