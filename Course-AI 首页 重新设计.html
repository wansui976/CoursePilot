<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>course-ai · 课程库</title>
<style>
  :root {
    --accent:        #2f6cea;
    --accent-press:  #255cd0;
    --accent-weak:   #eef3fd;
    --accent-weak-2: #e3ecfc;
    --accent-text:   #2a63d8;

    --ok:    #1f9d6b;
    --ok-bg: #e9f6f0;
    --warn:    #c98a1e;
    --warn-bg: #faf2e0;

    --bg-app:     #f3f4f6;
    --bg-sidebar: #fafafb;
    --bg-panel:   #ffffff;

    --text-1: #1c1e24;
    --text-2: #565b66;
    --text-3: #8b909b;
    --text-4: #aeb2bb;

    --line:      #e9eaee;
    --line-soft: #f0f1f4;

    --r-sm: 8px;
    --r-md: 11px;
    --r-lg: 14px;

    --shadow-card: 0 1px 2px rgba(20,24,40,.05), 0 4px 14px rgba(20,24,40,.04);
    --shadow-pop:  0 8px 30px rgba(20,24,40,.10);

    --font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    color: var(--text-1);
    background: #d9dbe0;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }

  /* ---------- window chrome ---------- */
  .window {
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg-app);
    overflow: hidden;
  }
  .titlebar {
    height: 46px;
    flex: 0 0 46px;
    display: flex;
    align-items: center;
    padding: 0 18px;
    background: linear-gradient(#fbfbfc, #f2f3f5);
    border-bottom: 1px solid var(--line);
    position: relative;
    user-select: none;
  }
  .lights { display: flex; gap: 8px; }
  .light { width: 12px; height: 12px; border-radius: 50%; }
  .light.r { background: #ff5f57; }
  .light.y { background: #febc2e; }
  .light.g { background: #28c840; }
  .titlebar .app-name {
    position: absolute; left: 0; right: 0; text-align: center;
    font-size: 13px; font-weight: 600; letter-spacing: .04em;
    color: var(--text-3); pointer-events: none;
    font-family: var(--mono);
  }

  .body { flex: 1; display: flex; min-height: 0; }

  /* ---------- left sidebar ---------- */
  .sidebar {
    width: 250px; flex: 0 0 250px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    padding: 18px 14px 14px;
  }
  .side-head {
    display: flex; align-items: center; gap: 9px;
    padding: 4px 8px 0;
    margin-bottom: 16px;
  }
  .side-head .ic { color: var(--accent); display: flex; }
  .side-head h1 { font-size: 15px; font-weight: 650; letter-spacing: .01em; }

  .btn {
    font-family: var(--font); font-size: 13.5px; font-weight: 600;
    border-radius: var(--r-sm); border: 1px solid transparent;
    cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
    gap: 7px; transition: background .14s, border-color .14s, box-shadow .14s, color .14s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent); color: #fff;
    box-shadow: 0 1px 2px rgba(47,108,234,.25);
  }
  .btn-primary:hover { background: var(--accent-press); }
  .btn-secondary {
    background: var(--bg-panel); color: var(--text-1);
    border-color: var(--line);
  }
  .btn-secondary:hover { border-color: #d6d8de; background: #fcfcfd; }
  .btn-ghost { background: transparent; color: var(--text-2); }
  .btn-ghost:hover { background: #f0f1f4; color: var(--text-1); }

  .add-course {
    width: 100%; height: 38px; margin-bottom: 22px;
    border-style: dashed; border-color: #d3d6dd; color: var(--text-2);
    background: transparent;
  }
  .add-course:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-weak); border-style: solid; }
  .add-course .plus { font-size: 16px; line-height: 1; }

  .nav-label {
    font-size: 11px; font-weight: 600; letter-spacing: .08em;
    color: var(--text-4); text-transform: none;
    padding: 0 8px 8px;
  }
  .nav { display: flex; flex-direction: column; gap: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 9px; border-radius: var(--r-sm);
    cursor: pointer; color: var(--text-1); font-size: 13.5px; font-weight: 500;
    transition: background .12s;
  }
  .nav-item .ic { color: var(--text-3); display: flex; transition: color .12s; }
  .nav-item .count { margin-left: auto; font-size: 12px; color: var(--text-4); font-variant-numeric: tabular-nums; }
  .nav-item:hover { background: #f0f1f4; }
  .nav-item.active { background: var(--accent-weak); color: var(--accent-text); font-weight: 600; }
  .nav-item.active .ic { color: var(--accent); }
  .nav-item.active .count { color: var(--accent-text); }

  .side-spacer { flex: 1; }
  .side-foot { border-top: 1px solid var(--line-soft); padding-top: 8px; display: flex; flex-direction: column; gap: 2px; }
  .foot-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px; border-radius: var(--r-sm);
    cursor: pointer; color: var(--text-2); font-size: 13px; font-weight: 500;
  }
  .foot-item:hover { background: #f0f1f4; color: var(--text-1); }
  .foot-item .ic { color: var(--text-3); display: flex; }
  .switch {
    margin-left: auto; width: 34px; height: 20px; border-radius: 11px;
    background: #d7dae1; position: relative; transition: background .16s; flex: 0 0 auto;
  }
  .switch::after {
    content: ""; position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px; border-radius: 50%; background: #fff;
    box-shadow: 0 1px 2px rgba(0,0,0,.2); transition: transform .16s;
  }
  .switch.on { background: var(--accent); }
  .switch.on::after { transform: translateX(14px); }

  /* ---------- content area (library) ---------- */
  .content {
    flex: 1; min-width: 0;
    background: var(--bg-app);
    display: flex; flex-direction: column; min-height: 0;
  }
  .content-head { padding: 24px 30px 0; }
  .content-head h2 { font-size: 18px; font-weight: 650; }
  .content-head .sub { font-size: 13px; color: var(--text-3); margin-top: 4px; }

  .toolbar {
    display: flex; align-items: center; gap: 12px;
    padding: 18px 30px 16px; flex-wrap: wrap;
  }
  .import-btn { height: 40px; padding: 0 18px; flex: 0 0 auto; }
  .url-group { display: flex; gap: 8px; flex: 1; min-width: 240px; max-width: 440px; }
  .toolbar .sort { margin-left: auto; }
  .url-input {
    flex: 1; height: 38px; border: 1px solid var(--line); border-radius: var(--r-sm);
    background: #fafafb; padding: 0 12px; font-size: 13px; font-family: var(--font);
    color: var(--text-1); transition: border-color .14s, background .14s, box-shadow .14s;
  }
  .url-input::placeholder { color: var(--text-4); }
  .url-input:focus {
    outline: none; border-color: var(--accent); background: #fff;
    box-shadow: 0 0 0 3px var(--accent-weak);
  }
  .dl-btn { height: 38px; padding: 0 16px; flex: 0 0 auto; }

  .list-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 30px 10px;
  }
  .list-bar .lbl { font-size: 11.5px; font-weight: 600; letter-spacing: .06em; color: var(--text-4); }
  .list-bar .sort { font-size: 12px; color: var(--text-3); cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .list-bar .sort:hover { color: var(--text-1); }

  .scroll { flex: 1; overflow-y: auto; padding: 4px 30px 30px; }
  .scroll::-webkit-scrollbar { width: 10px; }
  .scroll::-webkit-scrollbar-thumb { background: #e0e2e8; border-radius: 8px; border: 2px solid var(--bg-app); }
  .scroll::-webkit-scrollbar-thumb:hover { background: #d0d3da; }
  .grid {
    display: grid; gap: 14px; align-content: start;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  }

  .vid {
    display: grid; grid-template-columns: 92px 1fr; gap: 14px; align-items: center;
    background: var(--bg-panel); border: 1px solid var(--line); border-radius: var(--r-md);
    padding: 12px; cursor: pointer; box-shadow: var(--shadow-card);
    transition: transform .12s, box-shadow .12s, border-color .12s;
  }
  .vid:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(20,24,40,.08); border-color: #dfe1e7; }
  .vid.sel { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-weak); }

  .thumb {
    width: 92px; height: 58px; border-radius: 8px; position: relative; overflow: hidden;
    background:
      repeating-linear-gradient(135deg, #eceef2 0 7px, #e4e6eb 7px 14px);
    display: flex; align-items: center; justify-content: center;
    flex: 0 0 auto;
  }
  .thumb .play {
    width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,.86);
    display: flex; align-items: center; justify-content: center; color: var(--text-2);
    box-shadow: 0 1px 3px rgba(0,0,0,.12);
  }
  .thumb .dur {
    position: absolute; right: 4px; bottom: 4px;
    font-size: 10px; font-family: var(--mono); color: #fff;
    background: rgba(15,18,28,.66); padding: 1px 4px; border-radius: 4px;
    letter-spacing: .02em;
  }

  .vid-main { min-width: 0; display: flex; flex-direction: column; justify-content: center; gap: 6px; }
  .vid-title {
    font-size: 13.5px; font-weight: 550; line-height: 1.4; color: var(--text-1);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .vid.sel .vid-title { color: var(--accent-text); }
  .vid-meta { display: flex; align-items: center; gap: 7px; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11.5px; font-weight: 550; padding: 2px 8px; border-radius: 20px;
  }
  .chip .dot { width: 6px; height: 6px; border-radius: 50%; }
  .chip.done { color: var(--ok); background: var(--ok-bg); }
  .chip.done .dot { background: var(--ok); }
  .chip.ready { color: var(--accent-text); background: var(--accent-weak); }
  .chip.ready .dot { background: var(--accent); }
  .chip.proc { color: var(--warn); background: var(--warn-bg); }
  .chip.proc .dot { background: var(--warn); }
  .chip.pend { color: var(--text-3); background: #f0f1f4; }
  .chip.pend .dot { background: var(--text-4); }

  .prog { height: 3px; border-radius: 3px; background: #e8eaee; overflow: hidden; }
  .prog > i { display: block; height: 100%; border-radius: 3px; }
  .prog.done > i { background: var(--ok); }
  .prog.ready > i { background: var(--accent); }
  .prog.proc > i { background: var(--warn); }
</style>
</head>
<body>
  <div class="window">
    <!-- title bar -->
    <div class="titlebar">
      <div class="lights">
        <span class="light r"></span><span class="light y"></span><span class="light g"></span>
      </div>
      <span class="app-name">course-ai</span>
    </div>

    <div class="body">
      <!-- ============ SIDEBAR ============ -->
      <aside class="sidebar">
        <div class="side-head">
          <span class="ic">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          </span>
          <h1>课程库</h1>
        </div>

        <button class="btn add-course"><span class="plus">＋</span> 新建课程</button>

        <div class="nav-label">我的课程</div>
        <nav class="nav" id="nav">
          <div class="nav-item active" data-folder="downloads">
            <span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg></span>
            <span class="nm">下载视频</span>
            <span class="count">4</span>
          </div>
          <div class="nav-item" data-folder="recordings">
            <span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg></span>
            <span class="nm">录制视频</span>
            <span class="count">3</span>
          </div>
        </nav>

        <div class="side-spacer"></div>

        <div class="side-foot">
          <div class="foot-item" id="darkToggle">
            <span class="ic"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></span>
            <span>深色模式</span>
            <span class="switch" id="darkSwitch"></span>
          </div>
          <div class="foot-item">
            <span class="ic"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg></span>
            <span>设置</span>
          </div>
        </div>
      </aside>

      <!-- ============ CONTENT (LIBRARY) ============ -->
      <section class="content">
        <div class="content-head">
          <h2>课程视频</h2>
          <div class="sub" id="folderSub">下载视频 · 4 个视频</div>
        </div>

        <div class="toolbar">
          <button class="btn btn-primary import-btn">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            导入本地视频
          </button>
          <div class="url-group">
            <input class="url-input" placeholder="B 站 / 视频链接…" />
            <button class="btn btn-secondary dl-btn">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              下载
            </button>
          </div>
          <span class="sort">
            最近添加
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </div>

        <div class="scroll">
          <div class="grid" id="vidList"></div>
        </div>
      </section>

    </div>
  </div>

<script>
  const DATA = {
    downloads: [
      { title: "01.【申论之根】底层逻辑.mp4", dur: "1:45:19", status: "done",  progress: 100 },
      { title: "02.【申论之根】归纳概括题精讲.mp4", dur: "58:32", status: "ready", progress: 34 },
      { title: "03.【申论之根】提出对策题专项.mp4", dur: "1:12:04", status: "proc",  progress: 62 },
      { title: "04.【申论之根】综合分析方法论.mp4", dur: "1:33:50", status: "pend",  progress: 0 },
    ],
    recordings: [
      { title: "晨读带学_2024-05-30.mp4", dur: "22:10", status: "ready", progress: 0 },
      { title: "模考讲评·材料题片段.mp4", dur: "06:48", status: "done",  progress: 100 },
      { title: "周末答疑回放_05.mp4", dur: "41:25", status: "pend",  progress: 0 },
    ],
  };
  const FOLDER_NAME = { downloads: "下载视频", recordings: "录制视频" };

  const STATUS = {
    done:  { label: "已学完",  cls: "done" },
    ready: { label: "可学习",  cls: "ready" },
    proc:  { label: "处理中",  cls: "proc" },
    pend:  { label: "待处理",  cls: "pend" },
  };

  const vidList   = document.getElementById('vidList');
  const folderSub = document.getElementById('folderSub');

  let currentFolder = 'downloads';
  let selIndex = null;

  function statusChip(v) {
    const s = STATUS[v.status];
    let label = s.label;
    if (v.status === 'proc') label = '处理中 ' + v.progress + '%';
    if (v.status === 'done') label = '已学完';
    return '<span class="chip ' + s.cls + '"><span class="dot"></span>' + label + '</span>';
  }

  function progBar(v) {
    if (v.status === 'pend') return '';
    let pct = v.progress;
    let cls = v.status === 'proc' ? 'proc' : (v.status === 'done' ? 'done' : 'ready');
    if (v.status === 'ready' && v.progress === 0) return '';
    return '<div class="prog ' + cls + '"><i style="width:' + pct + '%"></i></div>';
  }

  function metaText(v) {
    if (v.status === 'done') return '已看完 · 100%';
    if (v.status === 'ready' && v.progress > 0) return '已看 ' + v.progress + '%';
    if (v.status === 'ready') return '资料已就绪';
    if (v.status === 'proc') return '正在生成学习资料';
    return '尚未生成资料';
  }

  function renderList() {
    const items = DATA[currentFolder];
    folderSub.textContent = FOLDER_NAME[currentFolder] + ' · ' + items.length + ' 个视频';
    vidList.innerHTML = items.map((v, i) => {
      return (
        '<div class="vid' + (selIndex === i ? ' sel' : '') + '" data-i="' + i + '">' +
          '<div class="thumb">' +
            '<span class="play"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 20 12 6 20 6 4"/></svg></span>' +
            '<span class="dur">' + v.dur + '</span>' +
          '</div>' +
          '<div class="vid-main">' +
            '<div class="vid-title">' + v.title + '</div>' +
            '<div class="vid-meta">' + statusChip(v) + '</div>' +
            progBar(v) +
          '</div>' +
        '</div>'
      );
    }).join('');
  }

  // click a card → (in the real app) open the learning workbench. Here: select.
  vidList.addEventListener('click', (e) => {
    const card = e.target.closest('.vid');
    if (!card) return;
    selIndex = +card.dataset.i;
    renderList();
  });

  // folder switch
  document.getElementById('nav').addEventListener('click', (e) => {
    const item = e.target.closest('.nav-item');
    if (!item) return;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');
    currentFolder = item.dataset.folder;
    selIndex = null;
    renderList();
  });

  // dark switch (visual only for now)
  document.getElementById('darkToggle').addEventListener('click', () => {
    document.getElementById('darkSwitch').classList.toggle('on');
  });

  renderList();
</script>
</body>
</html>
